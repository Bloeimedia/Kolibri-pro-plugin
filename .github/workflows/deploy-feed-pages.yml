name: Deploy Feed Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - kolibri-pro-v8/docs/feed.json
      - kolibri-pro-v8/docs/.nojekyll
      - .github/workflows/deploy-feed-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kolibri-pro-v8/docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
