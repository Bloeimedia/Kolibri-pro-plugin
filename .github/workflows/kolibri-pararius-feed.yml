name: Kolibri Pararius Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: kolibri-pro-v8/external-feed
        run: npm install

      - name: Install Chromium
        working-directory: kolibri-pro-v8/external-feed
        run: npx playwright install --with-deps chromium

      - name: Scrape and build feed
        working-directory: kolibri-pro-v8/external-feed
        env:
          PARARIUS_SOURCE_URL: ${{ secrets.PARARIUS_SOURCE_URL }}
          FEED_OUTPUT_FILE: ../docs/feed.json
          FEED_LIMIT: "30"
        run: node scrape-pararius.mjs

      - name: Commit updated feed
        run: |
          if git diff --quiet kolibri-pro-v8/docs/feed.json; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kolibri-pro-v8/docs/feed.json
          git commit -m "Update Pararius feed"
          git push
